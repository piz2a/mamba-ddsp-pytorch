<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Style Classifier</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Voice Style Classifier</h1>
          <p id="statusLine">Mic idle</p>
        </div>
        <div class="topbar__actions">
          <button id="micButton" class="primary" type="button">Start mic</button>
          <button id="resetButton" type="button">Reset</button>
        </div>
      </header>

      <section class="live-grid" aria-label="Live predictions">
        <article class="readout readout--large">
          <span class="readout__eyebrow">Vowel</span>
          <div class="readout__label" id="vowelLabel">-</div>
          <div class="readout__sub" id="vowelSub">waiting</div>
        </article>
        <article class="readout readout--large">
          <span class="readout__eyebrow">Syllable</span>
          <div class="readout__label" id="articLabel">-</div>
          <div class="readout__sub" id="articSub">waiting</div>
        </article>
        <article class="meters" aria-label="Signal meters">
          <div class="meter-line">
            <span>F0</span>
            <strong id="f0Value">- Hz</strong>
          </div>
          <div class="meter-line">
            <span>F1</span>
            <strong id="f1Value">- Hz</strong>
          </div>
          <div class="meter-line">
            <span>F2</span>
            <strong id="f2Value">- Hz</strong>
          </div>
          <label class="slider">
            <span>Gate</span>
            <input id="gateSlider" type="range" min="0.003" max="0.08" value="0.018" step="0.001" />
          </label>
        </article>
      </section>

      <section class="prob-grid" aria-label="Class probabilities">
        <div>
          <h2>ah · uh · oh · woo · eu · ee</h2>
          <div id="vowelBars" class="bars"></div>
        </div>
        <div>
          <h2>deu · dng</h2>
          <div id="articBars" class="bars"></div>
        </div>
      </section>

      <section class="scope-grid" aria-label="Audio scopes">
        <canvas id="waveCanvas" width="900" height="220"></canvas>
        <canvas id="spectrumCanvas" width="900" height="220"></canvas>
      </section>

      <section class="calibration-grid" aria-label="Calibration">
        <div>
          <div class="section-title">
            <h2>Vowel samples</h2>
            <span id="vowelModelState">heuristic</span>
          </div>
          <div id="vowelButtons" class="capture-grid capture-grid--six"></div>
        </div>
        <div>
          <div class="section-title">
            <h2>Syllable samples</h2>
            <span id="articModelState">heuristic</span>
          </div>
          <div id="articButtons" class="capture-grid capture-grid--two"></div>
        </div>
      </section>

      <section class="eval-grid" aria-label="Evaluation">
        <div>
          <div class="section-title">
            <h2>Quick test</h2>
            <button id="validateButton" type="button">Validate</button>
          </div>
          <pre id="validationOutput">No samples yet.</pre>
        </div>
        <div>
          <div class="section-title">
            <h2>Frame data</h2>
            <button id="exportButton" type="button">Export JSON</button>
          </div>
          <pre id="featureOutput">-</pre>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
