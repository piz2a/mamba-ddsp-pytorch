data:
  dataset: idmt_bass_note
  data_location: /disk1/ahnjiho/IDMT-SMT-BASS
  extension: "wav"

preprocess:
  sampling_rate: &samplingrate 16000
  signal_length: &signallength 32000
  block_size: &blocksize 256

  oneshot: false
  out_dir: ./preprocessed/

idmt_bass:
  examples_per_epoch: 512
  min_note_seconds: 0.35
  max_note_seconds: 1.35
  min_crossfade_seconds: 0.040
  max_crossfade_seconds: 0.090
  trim_top_db: 35.0
  trim_onset_top_db: 25.0
  trim_noise_percentile: 20.0
  trim_noise_margin_db: 12.0
  trim_frame_size: 512
  trim_hop_size: 128
  trim_pad_seconds: 0.012
  edge_fade_seconds: 0.004
  release_fade_seconds: 0.035
  event_width_seconds: 0.032
  include_expression_styles: ["NO", "BE", "DN", "HA", "VI"]
  include_string_numbers: [1, 2, 3, 4]
  cache_size: 512
  pitch_source: labels
  pitch_fmin: 40.0
  pitch_fmax: 600.0
  peak_normalize: true
  label_mode: observed_articulation
  use_note_shape_controls: true
  note_age_clip_seconds: 1.0
  seed:

model:
  architecture: bass_ddsp_v2
  recurrent_type: mamba
  hidden_size: 256
  n_harmonic: 100
  n_bands: 65
  sampling_rate: *samplingrate
  block_size: *blocksize
  mamba_d_state: 16
  mamba_d_conv: 4
  mamba_expand: 2
  z_size: 64
  articulation_embedding_size: 24
  use_note_shape_controls: true
  use_transient_branch: true
  use_sustain_branch: true
  use_noise_branch: true
  use_reverb: false
  transient_seconds: 0.20

train:
  scales: [4096, 2048, 1024, 512, 256, 128]
  overlap: .75
  loudness_stats_batches: 8
  num_workers: 0
  grad_clip_norm: 1.0
  rms_loss_weight: 1.0
  onset_loss_weight: 0.35
  onset_loss_seconds: 0.15
  transient_loss_weight: 2.0
  eval_every_epochs: 1
