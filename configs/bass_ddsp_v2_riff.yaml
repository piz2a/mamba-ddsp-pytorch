data:
  dataset: idmt_bass_riff
  data_location: /disk1/ahnjiho/IDMT-SMT-BASS
  extension: "wav"

preprocess:
  sampling_rate: &samplingrate 16000
  signal_length: &signallength 32768
  block_size: &blocksize 256

idmt_bass:
  examples_per_epoch: 1024
  min_note_seconds: 0.28
  max_note_seconds: 1.10
  min_crossfade_seconds: 0.030
  max_crossfade_seconds: 0.075
  trim_top_db: 35.0
  trim_onset_top_db: 25.0
  trim_noise_percentile: 20.0
  trim_noise_margin_db: 12.0
  trim_frame_size: 512
  trim_hop_size: 128
  trim_pad_seconds: 0.012
  edge_fade_seconds: 0.004
  release_fade_seconds: 0.035
  event_width_seconds: 0.032
  include_expression_styles: ["NO", "DN", "HA"]
  include_string_numbers: [1, 2, 3, 4]
  deduplicate: true
  cache_size: 768
  pitch_source: labels
  pitch_fmin: 30.0
  pitch_fmax: 330.0
  peak_normalize: true
  label_mode: observed_articulation
  use_note_shape_controls: true
  note_age_clip_seconds: 1.0
  seed:

model:
  hidden_size: 256
  n_harmonic: 100
  n_bands: 65
  sampling_rate: *samplingrate
  block_size: *blocksize
  recurrent_type: mamba
  mamba_d_state: 16
  mamba_d_conv: 4
  mamba_expand: 2
  z_size: 64
  articulation_embedding_size: 24
  scale_f0_input: true
  f0_min_hz: 30.0
  f0_max_hz: 330.0
  pitch_hidden_size: 64
  loudness_hidden_size: 64
  z_hidden_size: 256
  use_note_shape_controls: true
  use_transient_branch: true
  use_sustain_branch: true
  use_noise_branch: true
  use_reverb: false
  transient_seconds: 0.20

  # Explicit branch gain staging before summing.
  # These are fixed by default so the model cannot immediately undo them.
  sustain_gain_db: 0.0
  noise_gain_db: 6.0
  transient_gain_db: 18.0
  learnable_branch_gains: false

train:
  scales: [4096, 2048, 1024, 512, 256, 128]
  overlap: .75
  loudness_stats_batches: 8
  num_workers: 0
  grad_clip_norm: 1.0
  rms_loss_weight: 1.2
  onset_loss_weight: 0.45
  onset_loss_seconds: 0.15
  transient_loss_weight: 2.5
  eval_every_epochs: 1
